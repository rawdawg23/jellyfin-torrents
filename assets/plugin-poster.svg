<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <rect width="400" height="200" fill="url(#glow)"/>
  <text x="200" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#00d4ff" filter="url(#glow)">Electric Torbox</text>
  <text x="200" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#8b949e" letter-spacing="0.15em">EP-GROUP</text>
</svg>

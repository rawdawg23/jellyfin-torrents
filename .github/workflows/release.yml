name: Release

on:
  release:
    types: [published]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish
        run: dotnet publish Jellyfin.Plugin.TorrentLinks/Jellyfin.Plugin.TorrentLinks.csproj -c Release -o publish --no-self-contained

      - name: Create plugin zip
        run: |
          cd publish
          zip -r "../Jellyfin.Plugin.TorrentLinks_${{ steps.version.outputs.version }}.zip" .
          cd ..

      - name: Compute MD5
        id: checksum
        run: echo "checksum=$(md5sum Jellyfin.Plugin.TorrentLinks_${{ steps.version.outputs.version }}.zip | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Jellyfin.Plugin.TorrentLinks_${{ steps.version.outputs.version }}.zip
          tag_name: ${{ github.event.release.tag_name }}
          skip_duplicate: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          SOURCE_URL: "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/Jellyfin.Plugin.TorrentLinks_${{ steps.version.outputs.version }}.zip"
          CHECKSUM: ${{ steps.checksum.outputs.checksum }}
          CHANGELOG: ${{ github.event.release.body }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CHANGELOG_SANITIZED=$(echo "$CHANGELOG" | head -c 500 | tr -d '\n' || true)
          [ -z "$CHANGELOG_SANITIZED" ] && CHANGELOG_SANITIZED="Release $VERSION"
          export VERSION TAG SOURCE_URL CHECKSUM TIMESTAMP CHANGELOG_SANITIZED
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            const plugin = m.find(p => p.guid === 'a7b8c9d0-e1f2-3456-7890-abcdef123456') || m[0];
            const ver = {
              version: process.env.VERSION,
              targetAbi: '10.9.0.0',
              sourceUrl: process.env.SOURCE_URL,
              checksum: process.env.CHECKSUM,
              changelog: process.env.CHANGELOG_SANITIZED || ('Release ' + process.env.VERSION),
              timestamp: process.env.TIMESTAMP
            };
            plugin.versions = plugin.versions || [];
            const i = plugin.versions.findIndex(v => v.version === ver.version);
            if (i >= 0) plugin.versions[i] = ver; else plugin.versions.unshift(ver);
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2));
          "

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet || (git commit -m "chore: update manifest for ${{ steps.version.outputs.tag }}" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
